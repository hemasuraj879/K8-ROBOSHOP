apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  labels:
    tier: app
    project: roboshop
    environment: dev

spec:
  replicas: 1
  selector:
    matchLabels:
      tier: app
      project: roboshop
      environment: dev
  template:
    metadata:
      labels:
        tier: app
        project: roboshop
        environment: dev
    spec:
      containers:
      - name: user
        image: surajk879/user
        envFrom:
        - configMapRef:
            name: user-config

---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop

spec:
  selector:
    tier: app
    prject: roboshop
    environment: dev
  ports:
  - name: user-port
    protocol : TCP
    port: 8080
    targetPort: 8080

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-config
  namespace: roboshop
data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
