apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    tier: app
    project: roboshop
    environment: dev

spec:
  replicas: 1
  selector:
    matchLabels:
      tier: app
      project: roboshop
      environment: dev
    template:
      metadata:
        labels:
          tier: app
          project: roboshop
          environment: dev
      spec:
        containers:
        - name: catalogue
          image: surajk879/catalogue
          envFrom:
          - configMapRef:
              name: catalogue

--- 
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop

spec:
  selector:
    tier: app
    project: roboshop
    environment: dev
  ports:
  - name: catalogue-port
    protocal: TCP
    port: 8080
    targetPort: 8080

